<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
    <title>Project Grid</title>
  </head>
  <body>
    <div class="container">
      <div class="card">
        <figure>
          <img
            src="./assets/pic-1.png"
            alt="Picture"
            width="310"
            height="422"
          />
          <figcaption>Марсель Руссо</figcaption>
        </figure>
        <h2 class="card_title">Охота Амура</h2>
        <p class="card_text">Холст, масло (50х80)</p>
        <div class="card_price">14 500 руб</div>
        <button class="card_btn">В корзину</button>
      </div>

      <div class="card">
        <figure>
          <img
            src="./assets/pic-2.png"

            width="310"
            height="422"
          />

        </figure>

        <div class="card_price">16 500 руб</div>
        <button class="card_btn">В корзину</button>
      </div>

      <div class="card">

          <img
            src="./assets/pic-3.png"

          />

        <button class="card_btn">В корзину</button>
      </div>

      <div class="card">

          <img
            src="./assets/pic-4.png"

            width="310"
            height="422"
          />

        </figure>

        <p class="card_text">Бумага, акрил (50х80)</p>

        <button class="card_btn">В корзину</button>
      </div>

      <div class="card">
        <figure>
          <img
            src="./assets/pic-5.png"
            alt="Picture"
            width="310"
            height="422"
          />

      </div>

      <div class="card">
        <figure>
          <img
            src="./assets/pic-6.png"

            width="310"
            height="422"
          />
          <figcaption>Пьер Моранж</figcaption>
        </figure>
        <h2 class="card_title">Пьер Моранж</h2>
        <p class="card_text">Цветная литография (40х60)</p>
        <div class="card_price">20 000 руб</div>
        <button class="card_btn">В корзину</button>
      </div>
    </div>
  </body>
</html>
